<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agent 轨迹查看器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f1116;
      --panel: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --success: #3fb950;
      --warning: #d29922;
      --error: #f85149;
      --user-bg: #1c2128;
      --assistant-bg: #161b22;
      --tool-bg: #0d1117;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Noto Sans SC', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }
    .layout {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }
    .sidebar {
      width: 320px;
      min-width: 280px;
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: 14px;
    }
    .sidebar-actions {
      padding: 8px 12px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .sidebar-actions input[type="file"] {
      display: none;
    }
    .btn {
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
    }
    .btn:hover { background: #21262d; }
    .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn-primary:hover { filter: brightness(1.1); }
    .traj-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .traj-item {
      padding: 10px 12px;
      margin-bottom: 4px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      border: 1px solid transparent;
    }
    .traj-item:hover { background: #21262d; }
    .traj-item.active { background: #1c2128; border-color: var(--accent); }
    .traj-item .issue { font-weight: 500; color: var(--accent); }
    .traj-item .meta { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    .traj-item .status { display: inline-block; margin-left: 6px; padding: 0 6px; border-radius: 4px; font-size: 11px; }
    .traj-item .status.success { background: rgba(63,185,80,0.2); color: var(--success); }
    .traj-item .status.fail { background: rgba(248,81,73,0.2); color: var(--error); }
    .traj-item .status.other { background: rgba(210,153,34,0.2); color: var(--warning); }
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .main-header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      color: var(--text-muted);
    }
    .main-header strong { color: var(--text); }
    .content-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }
    .info-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
    }
    .info-card dt { font-size: 11px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 2px; }
    .info-card dd { margin: 0; font-size: 14px; }
    .info-card .exit-status.submitted { color: var(--success); }
    .info-card .exit-status.error { color: var(--error); }
    .info-card .exit-status.other { color: var(--warning); }
    .messages { max-width: 960px; }
    .msg {
      margin-bottom: 16px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .msg.system { background: var(--panel); }
    .msg.user { background: var(--user-bg); }
    .msg.assistant { background: var(--assistant-bg); }
    .msg.tool { background: var(--tool-bg); }
    .msg.exit { background: var(--panel); }
    .msg-header {
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .msg-header .role { text-transform: uppercase; }
    .msg-body {
      padding: 12px;
      font-size: 13px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg-body .code-wrap {
      background: #0d1117;
      border-radius: 6px;
      padding: 12px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .msg-body .code-wrap code { font-family: 'JetBrains Mono', monospace; font-size: 12px; }
    .msg-body .inline-code { font-family: 'JetBrains Mono', monospace; background: #21262d; padding: 0 4px; border-radius: 4px; }
    .msg.collapsed .msg-body { display: none; }
    .msg.collapsed .msg-header::after { content: ' ▶ 展开'; font-size: 11px; color: var(--accent); }
    .msg-toggle { cursor: pointer; }
    .tool-call { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--accent); margin-bottom: 8px; }
    .returncode { font-size: 11px; margin-bottom: 6px; }
    .returncode.ok { color: var(--success); }
    .returncode.fail { color: var(--error); }
    .empty-state {
      text-align: center;
      color: var(--text-muted);
      padding: 48px 24px;
    }
    .empty-state p { margin: 8px 0; }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-header">Agent 轨迹列表</div>
      <div class="sidebar-actions">
        <button type="button" class="btn btn-primary" id="loadIndex">从索引加载列表</button>
        <label class="btn" for="fileInput">打开本地 traj.json</label>
        <input type="file" id="fileInput" accept=".json,application/json" />
      </div>
      <div class="traj-list" id="trajList"></div>
    </aside>
    <main class="main">
      <div class="main-header" id="mainHeader">选择左侧轨迹或使用「打开本地 traj.json」加载文件</div>
      <div class="content-scroll" id="contentScroll">
        <div class="empty-state" id="emptyState">
          <p>从左侧选择一条轨迹，或点击「打开本地 traj.json」选择本机的 traj.json 文件。</p>
          <p>若在本地用 HTTP 打开本页（例如 <code>python -m http.server 8000</code> 后访问对应地址），可先点击「从索引加载列表」再选择轨迹。</p>
        </div>
        <div id="content" style="display: none;"></div>
      </div>
    </main>
  </div>
  <script>
    const BASE = window.location.pathname.replace(/\/[^/]*$/, '/');
    const trajListEl = document.getElementById('trajList');
    const mainHeaderEl = document.getElementById('mainHeader');
    const contentScrollEl = document.getElementById('contentScroll');
    const emptyStateEl = document.getElementById('emptyState');
    const contentEl = document.getElementById('content');
    const fileInputEl = document.getElementById('fileInput');
    const loadIndexBtn = document.getElementById('loadIndex');

    function showEmpty() {
      emptyStateEl.style.display = 'block';
      contentEl.style.display = 'none';
    }
    function showContent() {
      emptyStateEl.style.display = 'none';
      contentEl.style.display = 'block';
    }

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }
    function renderMarkdownLike(text) {
      if (!text) return '';
      const div = document.createElement('div');
      const parts = [];
      let rest = escapeHtml(text);
      const codeBlockRe = /```(\w*)\n([\s\S]*?)```/g;
      let lastIdx = 0;
      let m;
      while ((m = codeBlockRe.exec(rest)) !== null) {
        if (m.index > lastIdx) parts.push({ type: 'text', content: rest.slice(lastIdx, m.index) });
        parts.push({ type: 'code', lang: m[1], content: m[2] });
        lastIdx = m.index + m[0].length;
      }
      if (lastIdx < rest.length) parts.push({ type: 'text', content: rest.slice(lastIdx) });
      parts.forEach(p => {
        if (p.type === 'text') {
          const span = document.createElement('span');
          span.innerHTML = p.content.replace(/\n/g, '<br>');
          div.appendChild(span);
        } else {
          const pre = document.createElement('pre');
          pre.className = 'code-wrap';
          const code = document.createElement('code');
          code.textContent = p.content;
          pre.appendChild(code);
          div.appendChild(pre);
        }
      });
      return div.innerHTML;
    }

    function getExitStatusClass(exitStatus) {
      if (exitStatus === 'Submitted') return 'submitted';
      if (exitStatus && exitStatus !== 'Success' && exitStatus !== 'Submitted') return 'error';
      return 'other';
    }

    function renderInfo(info) {
      const cfg = info?.config || {};
      const agentCfg = cfg.agent || {};
      const modelCfg = cfg.model || {};
      const stats = info?.model_stats || {};
      const exitStatus = info?.exit_status ?? '';
      const submission = (info?.submission ?? '').trim();
      const html = `
        <dl class="info-card">
          <div><dt>退出状态</dt><dd class="exit-status ${getExitStatusClass(exitStatus)}">${escapeHtml(exitStatus || '—')}</dd></div>
          <div><dt>提交</dt><dd>${submission ? escapeHtml(submission.slice(0, 80)) + (submission.length > 80 ? '…' : '') : '—'}</dd></div>
          <div><dt>API 调用次数</dt><dd>${stats.api_calls != null ? stats.api_calls : '—'}</dd></div>
          <div><dt>步数限制</dt><dd>${agentCfg.step_limit != null ? agentCfg.step_limit : '—'}</dd></div>
          <div><dt>模型</dt><dd>${escapeHtml((modelCfg.model_name || '').slice(0, 40)) || '—'}</dd></div>
        </dl>
      `;
      return html;
    }

    function renderMessage(msg, index) {
      const role = msg.role || '';
      const content = msg.content;
      let body = '';
      let extraLabel = '';
      if (role === 'assistant' && msg.tool_calls?.length) {
        extraLabel = ` (${msg.tool_calls.length} 个 tool call)`;
        msg.tool_calls.forEach(tc => {
          const fn = tc.function;
          let args = '';
          try {
            const a = fn?.arguments ? JSON.parse(fn.arguments) : {};
            if (a.command) body += `<div class="tool-call">${escapeHtml(a.command)}</div>`;
          } catch (_) {}
        });
        if (content) body += renderMarkdownLike(content);
      } else if (role === 'tool') {
        const raw = (msg.extra?.raw_output ?? content ?? '').toString();
        const returncode = msg.extra?.returncode;
        const rcEl = returncode !== undefined
          ? `<div class="returncode ${returncode === 0 ? 'ok' : 'fail'}">returncode: ${returncode}</div>`
          : '';
        body = rcEl + '<pre class="code-wrap"><code>' + escapeHtml(raw.slice(0, 50000)) + (raw.length > 50000 ? '\n\n... (已截断)' : '') + '</code></pre>';
      } else if (content) {
        body = renderMarkdownLike(content);
      } else {
        body = '<span class="text-muted">(无文本)</span>';
      }
      const collapsed = role === 'system' || (role === 'user' && (content?.length || 0) > 800);
      const cls = `msg ${role} ${collapsed ? 'collapsed' : ''}`;
      return `<div class="${cls}" data-role="${role}">
        <div class="msg-header msg-toggle" title="点击展开/折叠">
          <span class="role">${escapeHtml(role)}</span>${extraLabel}
        </div>
        <div class="msg-body">${body}</div>
      </div>`;
    }

    function render(traj, sourceLabel) {
      mainHeaderEl.innerHTML = `<strong>${escapeHtml(sourceLabel)}</strong>`;
      const info = traj.info || {};
      const messages = traj.messages || [];
      let html = renderInfo(info);
      html += '<div class="messages">';
      messages.forEach((msg, i) => {
        if (msg.role === 'exit') {
          html += `<div class="msg exit">
            <div class="msg-header"><span class="role">exit</span></div>
            <div class="msg-body">${escapeHtml(msg.content || msg.extra?.exit_status || '')}</div>
          </div>`;
        } else {
          html += renderMessage(msg, i);
        }
      });
      html += '</div>';
      contentEl.innerHTML = html;
      showContent();
      contentEl.querySelectorAll('.msg-toggle').forEach(el => {
        el.addEventListener('click', () => {
          el.closest('.msg').classList.toggle('collapsed');
        });
      });
    }

    function loadFromUrl(path) {
      const url = BASE + path;
      fetch(url)
        .then(r => r.json())
        .then(traj => render(traj, path))
        .catch(err => {
          mainHeaderEl.textContent = '加载失败: ' + path;
          contentEl.innerHTML = '<pre class="code-wrap"><code>' + escapeHtml(err.message) + '</code></pre>';
          showContent();
        });
    }

    loadIndexBtn.addEventListener('click', () => {
      fetch(BASE + 'traj_index.json')
        .then(r => r.json())
        .then(data => {
          const list = data.trajectories || [];
          trajListEl.innerHTML = '';
          list.forEach(entry => {
            const statusClass = entry.exit_status === 'Submitted' ? 'success' : (entry.exit_status ? 'fail' : 'other');
            const item = document.createElement('div');
            item.className = 'traj-item';
            item.innerHTML = `
              <span class="issue">${escapeHtml(entry.model)} / ${escapeHtml(entry.issue_id)}</span>
              <span class="status ${statusClass}">${escapeHtml(entry.exit_status || '—')}</span>
              <div class="meta">${escapeHtml(entry.run_id)} · API: ${entry.api_calls != null ? entry.api_calls : '—'}</div>
            `;
            item.addEventListener('click', () => {
              trajListEl.querySelectorAll('.traj-item').forEach(i => i.classList.remove('active'));
              item.classList.add('active');
              loadFromUrl(entry.path);
            });
            trajListEl.appendChild(item);
          });
        })
        .catch(err => {
          alert('加载索引失败（若为 file:// 打开请使用「打开本地 traj.json」）。\n' + err.message);
        });
    });

    fileInputEl.addEventListener('change', (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const traj = JSON.parse(reader.result);
          render(traj, file.name);
          trajListEl.querySelectorAll('.traj-item').forEach(i => i.classList.remove('active'));
        } catch (err) {
          alert('解析 JSON 失败: ' + err.message);
        }
      };
      reader.readAsText(file, 'UTF-8');
      e.target.value = '';
    });
  </script>
</body>
</html>
